<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴스 키워드 트렌드</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#e6edf3; font-family:'Segoe UI',sans-serif; }

header {
  padding:10px 20px; border-bottom:1px solid #21262d;
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
header h1 { font-size:16px; font-weight:700; }
#updated-at { font-size:11px; color:#8b949e; }

#stats { display:flex; gap:16px; padding:8px 20px; border-bottom:1px solid #21262d; align-items:center; }
.stat { display:flex; align-items:baseline; gap:5px; }
.stat .num { font-size:18px; font-weight:700; color:#58a6ff; }
.stat .label { font-size:11px; color:#8b949e; }

#toolbar {
  padding:8px 20px; display:flex; gap:6px; align-items:center; flex-wrap:wrap;
  border-bottom:1px solid #21262d;
}
.filter-btn {
  padding:3px 10px; border-radius:20px; border:1px solid #30363d;
  background:#161b22; color:#8b949e; cursor:pointer; font-size:11px; transition:all 0.2s;
  white-space:nowrap;
}
.filter-btn.active { background:#58a6ff; color:#0d1117; border-color:#58a6ff; }
.filter-btn:hover:not(.active) { border-color:#58a6ff; color:#58a6ff; }
.group-filter-btn {
  padding:3px 10px; border-radius:20px; border:1px solid transparent;
  background:transparent; cursor:pointer; font-size:11px; transition:all 0.2s;
  white-space:nowrap; font-weight:600;
}
.group-filter-btn.active { opacity:1 !important; }
.group-filter-btn:not(.active) { opacity:0.45; }
.group-filter-btn:hover { opacity:1 !important; }
#search {
  padding:3px 10px; border-radius:20px; border:1px solid #30363d;
  background:#161b22; color:#e6edf3; font-size:11px; width:130px; outline:none;
}
#search:focus { border-color:#58a6ff; }
.sep { width:1px; height:18px; background:#21262d; flex-shrink:0; }

#add-group-bar {
  padding:7px 20px; display:flex; gap:6px; align-items:center;
  border-bottom:1px solid #21262d; background:#0a0d12;
}
#add-group-bar span { font-size:11px; color:#8b949e; }
#new-group-input {
  padding:3px 10px; border-radius:6px; border:1px solid #30363d;
  background:#161b22; color:#e6edf3; font-size:11px; width:140px; outline:none;
}
#new-group-input:focus { border-color:#3fb950; }
#new-group-color { width:26px; height:22px; border:none; border-radius:4px; cursor:pointer; padding:1px; }
#new-group-btn {
  padding:3px 10px; border-radius:6px; border:none; background:#238636;
  color:#fff; cursor:pointer; font-size:11px; font-weight:600;
}
#new-group-btn:hover { background:#2ea043; }

#heatmap {
  margin:12px 20px;
  display:flex; flex-wrap:wrap; gap:8px;
  align-items:flex-start; align-content:flex-start;
}

.sector {
  border:1px solid #30363d; border-radius:8px; overflow:hidden; flex-shrink:0;
}
.sector.manual-sector { border-style:dashed; border-width:1.5px; }
.sector.drag-over { background:#1c2128 !important; outline:2px dashed #58a6ff; outline-offset:-2px; }

.sector-label {
  padding:5px 8px; font-size:10px; font-weight:700; letter-spacing:0.4px;
  text-transform:uppercase; border-bottom:1px solid #21262d;
  display:flex; align-items:center; gap:5px; background:#0a0d12; user-select:none;
}
.label-text { flex:1; }
.sector-count { opacity:.5; font-weight:400; }
.sector-del { background:none; border:none; color:#30363d; cursor:pointer; font-size:10px; padding:0 2px; }
.sector-del:hover { color:#f85149; }

/* 기타 섹터 - 그리드 레이아웃 */
.sector-body {
  padding:8px; display:flex; flex-wrap:wrap; gap:6px;
  align-content:flex-start;
}
.sector-body.grid-layout {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(70px, 1fr));
  gap:5px;
}
.sector-body .empty-hint { font-size:11px; color:#30363d; padding:4px; align-self:center; }

/* 버블 */
.bubble {
  border-radius:6px; display:flex; align-items:center; justify-content:center;
  cursor:grab; font-weight:700; text-align:center; padding:4px; flex-shrink:0;
  user-select:none; transition:filter 0.12s, transform 0.12s; position:relative; line-height:1.2;
}
.bubble:hover { filter:brightness(1.2); transform:scale(1.05); z-index:10; }
.bubble.dragging { opacity:0.3; cursor:grabbing; }
.bubble .kw-name { display:block; pointer-events:none; word-break:keep-all; }
.bubble .kw-count { display:block; opacity:0.7; pointer-events:none; }
.bubble .rm {
  display:none; position:absolute; top:-4px; right:-4px;
  width:14px; height:14px; border-radius:50%; background:#f85149;
  color:#fff; font-size:8px; line-height:14px; text-align:center;
  cursor:pointer; pointer-events:all; z-index:20; font-weight:900;
}
.bubble:hover .rm { display:block; }

/* 키워드 서브그룹 (버블 안에 버블 묶음) */
.kw-subgroup {
  border:1px dashed rgba(255,255,255,0.2); border-radius:6px;
  padding:4px; display:flex; flex-wrap:wrap; gap:4px;
  position:relative; cursor:default;
}
.kw-subgroup-label {
  position:absolute; top:-8px; left:6px;
  font-size:9px; color:rgba(255,255,255,0.5);
  background:#0d1117; padding:0 3px;
}
.kw-subgroup.drag-over { background:rgba(255,255,255,0.05); }

/* 키워드 이름 편집 */
.bubble .kw-name-editable {
  display:block; pointer-events:all; cursor:text;
  outline:none; border-bottom:1px solid transparent;
  min-width:20px;
}
.bubble .kw-name-editable:focus {
  border-bottom:1px solid rgba(255,255,255,0.5);
  background:rgba(0,0,0,0.2); border-radius:2px; padding:0 2px;
}

#drag-hint {
  display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:#161b22; border:1px solid #58a6ff; border-radius:8px;
  padding:7px 16px; font-size:12px; color:#58a6ff; z-index:500; pointer-events:none;
}

/* 뉴스 모달 */
#modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8);
  z-index:300; align-items:center; justify-content:center;
}
#modal-overlay.show { display:flex; }
#modal {
  background:#161b22; border:1px solid #30363d; border-radius:12px;
  width:740px; max-width:96vw; max-height:84vh; display:flex; flex-direction:column;
}
#modal-header {
  padding:16px 20px; border-bottom:1px solid #21262d;
  display:flex; justify-content:space-between; align-items:flex-start;
}
#modal-title { font-size:16px; font-weight:700; margin-bottom:2px; }
#modal-meta { font-size:11px; color:#8b949e; }
#modal-close { cursor:pointer; font-size:16px; color:#8b949e; background:none; border:none; }
#modal-close:hover { color:#e6edf3; }
#modal-body { padding:12px 20px; overflow-y:auto; }
.news-card { padding:12px; border:1px solid #21262d; border-radius:8px; margin-bottom:8px; background:#0d1117; }
.news-card:hover { border-color:#58a6ff; }
.card-title { font-size:13px; font-weight:600; margin-bottom:4px; }
.card-title a { color:#e6edf3; text-decoration:none; }
.card-title a:hover { color:#58a6ff; }
.card-date { font-size:11px; color:#8b949e; margin-bottom:6px; }
.card-summary { font-size:12px; color:#8b949e; line-height:1.6; }
.card-insight { font-size:11px; color:#3fb950; margin-top:6px; padding-top:6px; border-top:1px solid #21262d; line-height:1.5; }
</style>
</head>
<body>

<header>
  <h1>📊 뉴스 키워드 히트맵</h1>
  <span id="updated-at"></span>
</header>

<div id="stats">
  <div class="stat"><span class="num" id="stat-articles">-</span><span class="label">누적 뉴스</span></div>
  <div class="stat"><span class="num" id="stat-keywords">-</span><span class="label">키워드</span></div>
</div>

<div id="toolbar">
  <button class="filter-btn active" onclick="setCountFilter('all',this)">전체</button>
  <button class="filter-btn" onclick="setCountFilter('top30',this)">TOP 30</button>
  <button class="filter-btn" onclick="setCountFilter('top60',this)">TOP 60</button>
  <input id="search" type="text" placeholder="키워드 검색..." oninput="render()">
  <div class="sep"></div>
  <div id="group-filter-btns" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
</div>

<div id="add-group-bar">
  <span>+ 새 그룹:</span>
  <input id="new-group-input" placeholder="그룹 이름..." onkeydown="if(event.key==='Enter')addGroup()">
  <input type="color" id="new-group-color" value="#f78166">
  <button id="new-group-btn" onclick="addGroup()">추가</button>
</div>

<div id="heatmap"></div>
<div id="drag-hint">🎯 섹터에 드롭 or 버블 위에 드롭하면 서브그룹!</div>

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div id="modal-header">
      <div><div id="modal-title"></div><div id="modal-meta"></div></div>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const LS = 'ntt_v4';
const LS_DISMISSED = 'ntt_dismissed_v4';
const LS_SUBGROUPS = 'ntt_subgroups_v1'; // { groupName: { mainKw: [subKws] } }
const LS_RENAMES = 'ntt_renames_v1'; // { originalName: displayName }

let DB = {};
let allKws = [];
let countFilter = 'all';
let groupFilter = null;
let dragKw = null;
let dragOverBubble = null; // 버블 위에 드래그 중인 대상

function getGroups() { try { return JSON.parse(localStorage.getItem(LS)) || {}; } catch { return {}; } }
function setGroups(g) { localStorage.setItem(LS, JSON.stringify(g)); }
function getDismissed() { try { return JSON.parse(localStorage.getItem(LS_DISMISSED)) || {}; } catch { return {}; } }
function setDismissed(d) { localStorage.setItem(LS_DISMISSED, JSON.stringify(d)); }
function getSubgroups() { try { return JSON.parse(localStorage.getItem(LS_SUBGROUPS)) || {}; } catch { return {}; } }
function setSubgroups(s) { localStorage.setItem(LS_SUBGROUPS, JSON.stringify(s)); }
function getRenames() { try { return JSON.parse(localStorage.getItem(LS_RENAMES)) || {}; } catch { return {}; } }
function setRenames(r) { localStorage.setItem(LS_RENAMES, JSON.stringify(r)); }

async function init() {
  try {
    const res = await fetch('news_db.json');
    if (!res.ok) throw new Error();
    DB = await res.json();
    document.getElementById('stat-articles').textContent = DB.total_articles;
    document.getElementById('stat-keywords').textContent = DB.total_keywords;
    document.getElementById('updated-at').textContent = '업데이트: ' + DB.updated_at;
    allKws = Object.entries(DB.keywords || {})
      .map(([name, d]) => ({ name, count: d.count, articles: d.articles }))
      .sort((a, b) => b.count - a.count);
    render();
  } catch {
    document.getElementById('heatmap').innerHTML =
      '<div style="padding:60px;text-align:center;color:#f85149">❌ news_db.json을 GitHub에 업로드해주세요.</div>';
  }
}

function getDisplayName(name) {
  const renames = getRenames();
  return renames[name] || name;
}

function getFiltered() {
  let kws = [...allKws];
  const q = document.getElementById('search').value.trim();
  if (q) kws = kws.filter(k => k.name.includes(q) || getDisplayName(k.name).includes(q));
  if (countFilter === 'top30') kws = kws.slice(0, 30);
  if (countFilter === 'top60') kws = kws.slice(0, 60);
  return kws;
}

function setCountFilter(t, btn) {
  countFilter = t;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function resolveGroup(kw, groups, dismissed) {
  const manualGroups = Object.entries(groups)
    .filter(([, gd]) => gd.keywords.includes(kw.name))
    .map(([gname]) => gname);
  if (manualGroups.length) return { type: 'manual', groups: manualGroups };
  if (dismissed[kw.name]) return { type: 'auto', group: '기타' };
  return { type: 'auto', group: '기타' };
}

function render() {
  const hm = document.getElementById('heatmap');
  const filtered = getFiltered();
  const groups = getGroups();
  const dismissed = getDismissed();
  const subgroups = getSubgroups();
  const renames = getRenames();

  const maxC = allKws[0]?.count || 1;
  const minC = allKws[allKws.length - 1]?.count || 1;

  // 그룹 필터 버튼
  renderGroupFilterBtns(groups, filtered, dismissed);

  // 섹터별 분류
  const manualSectors = {};
  Object.keys(groups).forEach(g => { manualSectors[g] = []; });

  const etcKws = [];

  filtered.forEach(kw => {
    const resolved = resolveGroup(kw, groups, dismissed);
    if (resolved.type === 'manual') {
      resolved.groups.forEach(g => { if (manualSectors[g]) manualSectors[g].push(kw); });
    } else {
      etcKws.push(kw);
    }
  });

  function renderBubble(kw, color, removable, removeAction, inSubgroup) {
    const ratio = maxC === minC ? 0.5 : (kw.count - minC) / (maxC - minC);
    // 기타 섹터는 고정 작은 크기, 그룹 섹터는 비율 크기
    const size = inSubgroup ? 52 : Math.round(52 + ratio * 80);
    const fs = inSubgroup ? 9 : Math.round(9 + ratio * 5);
    const cfs = Math.round(fs * 0.75);
    const alpha = Math.round(35 + ratio * 60).toString(16).padStart(2, '0');
    const rm = removable ? `<span class="rm" onclick="${removeAction}">✕</span>` : '';
    const displayName = getDisplayName(kw.name);
    return `<div class="bubble" data-kw="${escJ(kw.name)}" draggable="true"
      style="width:${size}px;height:${size}px;font-size:${fs}px;
             background:${color+alpha};border:1.5px solid ${color}88;color:#e6edf3;">
      ${rm}
      <div>
        <span class="kw-name-editable" contenteditable="true"
          onblur="renameKw('${escJ(kw.name)}',this)"
          onclick="event.stopPropagation()"
          ondblclick="event.stopPropagation()">${displayName}</span>
        <span class="kw-count" style="font-size:${cfs}px">${kw.count}회</span>
      </div>
    </div>`;
  }

  function renderSector(label, color, kws, isManual) {
    if (groupFilter && groupFilter !== label) return '';

    // 수동 그룹에서 서브그룹 처리
    let bodyContent = '';
    if (isManual) {
      const sg = subgroups[label] || {};
      const assignedToSub = new Set(Object.values(sg).flat());
      const mainKws = kws.filter(k => !assignedToSub.has(k.name));
      
      // 일반 버블
      bodyContent += mainKws.map(kw => {
        return renderBubble(kw, color, true, `removeFromManual('${escJ(label)}','${escJ(kw.name)}')`, false);
      }).join('');

      // 서브그룹
      Object.entries(sg).forEach(([mainKw, subKwNames]) => {
        const mainKwObj = kws.find(k => k.name === mainKw);
        if (!mainKwObj) return;
        const subKwObjs = subKwNames.map(n => kws.find(k => k.name === n)).filter(Boolean);
        if (!subKwObjs.length) return;

        bodyContent += `<div class="kw-subgroup" data-group="${escJ(label)}" data-main="${escJ(mainKw)}"
          ondragover="sgOver(event,this)" ondragleave="sgLeave(this)" ondrop="sgDrop(event,'${escJ(label)}','${escJ(mainKw)}')">
          <span class="kw-subgroup-label">${getDisplayName(mainKw)}</span>
          ${renderBubble(mainKwObj, color, true, `removeFromManual('${escJ(label)}','${escJ(mainKw)}')`, true)}
          ${subKwObjs.map(k => renderBubble(k, color, true, `removeFromSubgroup('${escJ(label)}','${escJ(mainKw)}','${escJ(k.name)}')`, true)).join('')}
        </div>`;
      });
    } else {
      // 기타 섹터 - 그리드
      bodyContent = kws.map(kw => renderBubble(kw, color, label !== '기타', `dismissKw('${escJ(kw.name)}')`, false)).join('');
    }

    const delBtn = isManual ? `<button class="sector-del" onclick="deleteGroup('${escJ(label)}')">✕</button>` : '';
    const droppable = isManual ? `data-manual="${escJ(label)}"` : '';
    const gridClass = label === '기타' ? 'grid-layout' : '';
    const minW = label === '기타' ? 'min-width:calc(100vw - 40px)' : 'min-width:110px';

    return `<div class="sector ${isManual?'manual-sector':''}" ${droppable} style="border-color:${color}${isManual?'':'44'};${minW}">
      <div class="sector-label" style="color:${color}">
        <span class="label-text">${label}</span>
        <span class="sector-count">${kws.length}</span>
        ${delBtn}
      </div>
      <div class="sector-body ${gridClass}" style="${label==='기타'?'max-height:320px;overflow-y:auto;':''}">
        ${bodyContent || (isManual ? '<span class="empty-hint">드래그해서 추가</span>' : '')}
      </div>
    </div>`;
  }

  let html = '';
  Object.entries(manualSectors).forEach(([g, kws]) => {
    const color = groups[g]?.color || '#58a6ff';
    html += renderSector(g, color, kws, true);
  });
  if (etcKws.length && (!groupFilter || groupFilter === '기타')) {
    html += renderSector('기타', '#8b949e', etcKws, false);
  }

  hm.innerHTML = html || '<div style="padding:40px;color:#8b949e;text-align:center">키워드가 없어요.</div>';

  // 버블 이벤트
  hm.querySelectorAll('.bubble').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragKw = el.dataset.kw;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      document.getElementById('drag-hint').style.display = 'block';
    });
    el.addEventListener('dragend', () => {
      dragKw = null;
      el.classList.remove('dragging');
      document.getElementById('drag-hint').style.display = 'none';
      hm.querySelectorAll('.bubble.drop-target').forEach(b => b.classList.remove('drop-target'));
    });
    // 버블 위에 드래그 → 서브그룹 힌트
    el.addEventListener('dragover', e => {
      e.preventDefault();
      if (dragKw && dragKw !== el.dataset.kw) {
        el.style.outline = '2px solid #f78166';
      }
    });
    el.addEventListener('dragleave', () => { el.style.outline = ''; });
    el.addEventListener('drop', e => {
      e.preventDefault(); e.stopPropagation();
      el.style.outline = '';
      if (!dragKw || dragKw === el.dataset.kw) return;
      // 어느 수동 그룹에 있는지 찾기
      const sector = el.closest('.sector[data-manual]');
      if (!sector) return;
      const gname = sector.dataset.manual;
      const mainKw = el.dataset.kw;
      const subKw = dragKw;
      const sg = getSubgroups();
      if (!sg[gname]) sg[gname] = {};
      if (!sg[gname][mainKw]) sg[gname][mainKw] = [];
      if (!sg[gname][mainKw].includes(subKw)) sg[gname][mainKw].push(subKw);
      setSubgroups(sg);
      render();
    });
    el.addEventListener('click', e => {
      if (e.target.classList.contains('rm')) return;
      if (e.target.classList.contains('kw-name-editable')) return;
      showModal(el.dataset.kw);
    });
  });

  // 수동 섹터 드롭
  hm.querySelectorAll('.sector[data-manual]').forEach(sec => {
    sec.addEventListener('dragover', e => { e.preventDefault(); sec.classList.add('drag-over'); });
    sec.addEventListener('dragleave', e => { if (!sec.contains(e.relatedTarget)) sec.classList.remove('drag-over'); });
    sec.addEventListener('drop', e => {
      e.preventDefault(); sec.classList.remove('drag-over');
      if (!dragKw) return;
      const gname = sec.dataset.manual;
      const g = getGroups();
      if (!g[gname]) return;
      if (!g[gname].keywords.includes(dragKw)) {
        g[gname].keywords.push(dragKw);
        setGroups(g);
        // dismissed 해제
        const d = getDismissed(); delete d[dragKw]; setDismissed(d);
        render();
      }
    });
  });
}

function sgOver(e, el) { e.preventDefault(); el.classList.add('drag-over'); }
function sgLeave(el) { el.classList.remove('drag-over'); }
function sgDrop(e, gname, mainKw) {
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.kw-subgroup').forEach(el => el.classList.remove('drag-over'));
  if (!dragKw || dragKw === mainKw) return;
  const sg = getSubgroups();
  if (!sg[gname]) sg[gname] = {};
  if (!sg[gname][mainKw]) sg[gname][mainKw] = [];
  if (!sg[gname][mainKw].includes(dragKw)) sg[gname][mainKw].push(dragKw);
  setSubgroups(sg);
  render();
}

function renderGroupFilterBtns(groups, filtered, dismissed) {
  const container = document.getElementById('group-filter-btns');
  let html = `<button class="group-filter-btn ${!groupFilter?'active':''}"
    style="color:#8b949e;border:1px solid #30363d;border-radius:20px;background:${!groupFilter?'#21262d':'transparent'}"
    onclick="setGroupFilter(null)">전체보기</button>`;
  Object.entries(groups).forEach(([gname, gdata]) => {
    const color = gdata.color;
    html += `<button class="group-filter-btn ${groupFilter===gname?'active':''}"
      style="color:${color};border:1px solid ${color}66;border-radius:20px;background:${groupFilter===gname?color+'22':'transparent'}"
      onclick="setGroupFilter('${escJ(gname)}')">${gname}</button>`;
  });
  if (!groupFilter || groupFilter === '기타') {
    html += `<button class="group-filter-btn ${groupFilter==='기타'?'active':''}"
      style="color:#8b949e;border:1px solid #30363d;border-radius:20px;background:${groupFilter==='기타'?'#21262d':'transparent'}"
      onclick="setGroupFilter('기타')">기타</button>`;
  }
  container.innerHTML = html;
}

function setGroupFilter(g) { groupFilter = g; render(); }

// 키워드 이름 변경
function renameKw(original, el) {
  const newName = el.textContent.trim();
  if (!newName || newName === getDisplayName(original)) return;
  const r = getRenames();
  r[original] = newName;
  setRenames(r);
}

function dismissKw(kwName) {
  const d = getDismissed(); d[kwName] = true; setDismissed(d); render();
}

function removeFromManual(gname, kwName) {
  const g = getGroups();
  if (!g[gname]) return;
  g[gname].keywords = g[gname].keywords.filter(k => k !== kwName);
  setGroups(g);
  // 서브그룹에서도 제거
  const sg = getSubgroups();
  if (sg[gname]) {
    delete sg[gname][kwName];
    Object.keys(sg[gname]).forEach(mk => {
      sg[gname][mk] = sg[gname][mk].filter(k => k !== kwName);
    });
    setSubgroups(sg);
  }
  const stillInManual = Object.values(g).some(gd => gd.keywords.includes(kwName));
  if (!stillInManual) { const d = getDismissed(); d[kwName] = true; setDismissed(d); }
  render();
}

function removeFromSubgroup(gname, mainKw, subKw) {
  const sg = getSubgroups();
  if (!sg[gname]?.[mainKw]) return;
  sg[gname][mainKw] = sg[gname][mainKw].filter(k => k !== subKw);
  setSubgroups(sg);
  render();
}

function addGroup() {
  const name = document.getElementById('new-group-input').value.trim();
  const color = document.getElementById('new-group-color').value;
  if (!name) return;
  const g = getGroups();
  if (g[name]) { alert('이미 있는 이름이에요.'); return; }
  g[name] = { color, keywords: [] };
  setGroups(g);
  document.getElementById('new-group-input').value = '';
  render();
}

function deleteGroup(name) {
  if (!confirm(`"${name}" 그룹을 삭제할까요?`)) return;
  const g = getGroups(); delete g[name]; setGroups(g);
  const sg = getSubgroups(); delete sg[name]; setSubgroups(sg);
  render();
}

function showModal(name) {
  const kw = allKws.find(k => k.name === name);
  if (!kw) return;
  const displayName = getDisplayName(name);
  document.getElementById('modal-title').innerHTML = `<span style="color:#58a6ff">#</span> ${displayName}`;
  document.getElementById('modal-meta').textContent = `${kw.count}회 언급 · ${kw.articles.length}건`;
  document.getElementById('modal-body').innerHTML = kw.articles.map(a => `
    <div class="news-card">
      <div class="card-title">${a.url?`<a href="${a.url}" target="_blank">🔗 ${a.title}</a>`:a.title}</div>
      <div class="card-date">📅 ${a.date}</div>
      <div class="card-summary">${(a.summary||'').replace(/\n/g,'<br>')}</div>
      ${a.insight?`<div class="card-insight">📈 ${(a.insight||'').replace(/\n/g,'<br>')}</div>`:''}
    </div>`).join('');
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }
function escJ(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

init();
</script>
