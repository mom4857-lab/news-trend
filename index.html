<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴스 키워드 트렌드</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#e6edf3; font-family:'Segoe UI',sans-serif; min-height:100vh; }

header {
  padding:14px 24px; border-bottom:1px solid #21262d;
  display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
}
header h1 { font-size:17px; font-weight:700; }
#updated-at { font-size:12px; color:#8b949e; }

#stats { display:flex; gap:20px; padding:10px 24px; border-bottom:1px solid #21262d; }
.stat .num { font-size:20px; font-weight:700; color:#58a6ff; }
.stat .label { font-size:11px; color:#8b949e; }

#controls {
  padding:10px 24px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;
  border-bottom:1px solid #21262d;
}
.filter-btn {
  padding:4px 12px; border-radius:20px; border:1px solid #30363d;
  background:#161b22; color:#8b949e; cursor:pointer; font-size:12px; transition:all 0.2s;
}
.filter-btn.active,.filter-btn:hover { background:#58a6ff; color:#0d1117; border-color:#58a6ff; }
#search {
  padding:4px 12px; border-radius:20px; border:1px solid #30363d;
  background:#161b22; color:#e6edf3; font-size:12px; width:160px; outline:none;
}
#search:focus { border-color:#58a6ff; }

/* 새 그룹 추가 바 */
#add-group-bar {
  padding:8px 24px; display:flex; gap:8px; align-items:center;
  border-bottom:1px solid #21262d; background:#0d1117;
}
#add-group-input {
  padding:5px 12px; border-radius:6px; border:1px solid #30363d;
  background:#161b22; color:#e6edf3; font-size:12px; width:180px; outline:none;
}
#add-group-input:focus { border-color:#58a6ff; }
#add-group-color { width:32px; height:28px; border:none; border-radius:4px; cursor:pointer; padding:1px; }
#add-group-btn {
  padding:5px 12px; border-radius:6px; border:none; background:#238636;
  color:#fff; cursor:pointer; font-size:12px; font-weight:600;
}
#add-group-btn:hover { background:#2ea043; }
#add-group-bar span { font-size:12px; color:#8b949e; }

/* 대시보드 레이아웃 */
#dashboard { padding:16px 24px; display:flex; flex-direction:column; gap:16px; }

/* 전체 키워드 섹션 */
.section {
  border:1px solid #21262d; border-radius:10px; overflow:hidden;
}
.section-header {
  padding:10px 16px; display:flex; align-items:center; gap:10px;
  background:#161b22; border-bottom:1px solid #21262d;
  cursor:pointer; user-select:none;
}
.section-color-bar { width:4px; height:20px; border-radius:2px; flex-shrink:0; }
.section-title { font-size:14px; font-weight:600; flex:1; }
.section-count { font-size:12px; color:#8b949e; }
.section-toggle { font-size:11px; color:#8b949e; margin-left:4px; }
.section-delete {
  background:none; border:none; color:#8b949e; cursor:pointer; font-size:13px; padding:2px 6px;
  border-radius:4px;
}
.section-delete:hover { color:#f85149; background:#21262d; }

.section-body {
  padding:14px 16px; display:flex; flex-wrap:wrap; gap:8px; min-height:60px;
  transition:background 0.15s;
}
.section-body.drag-over { background:#1c2128; outline:2px dashed #30363d; outline-offset:-4px; }
.section-body.collapsed { display:none; }
.section-body.empty::after {
  content:'키워드를 여기에 드래그하세요';
  color:#30363d; font-size:12px; align-self:center; pointer-events:none;
}

/* 버블 */
.bubble {
  border-radius:8px; display:flex; align-items:center; justify-content:center;
  cursor:grab; font-weight:600; text-align:center; padding:8px; flex-shrink:0;
  user-select:none; transition:filter 0.15s, transform 0.15s;
  position:relative;
}
.bubble:hover { filter:brightness(1.15); }
.bubble.dragging { opacity:0.35; cursor:grabbing; }
.bubble .kw-name { display:block; pointer-events:none; }
.bubble .kw-count { display:block; font-size:0.72em; opacity:0.75; margin-top:1px; pointer-events:none; }
/* 그룹 섹션 안 버블에 제거 버튼 */
.bubble .remove-btn {
  display:none; position:absolute; top:-5px; right:-5px;
  width:16px; height:16px; border-radius:50%; background:#f85149;
  color:#fff; font-size:9px; line-height:16px; text-align:center;
  cursor:pointer; pointer-events:all; z-index:5;
}
.bubble:hover .remove-btn { display:block; }

/* 뉴스 모달 */
#modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75);
  z-index:100; align-items:center; justify-content:center;
}
#modal-overlay.show { display:flex; }
#modal {
  background:#161b22; border:1px solid #30363d; border-radius:12px;
  width:720px; max-width:95vw; max-height:82vh; display:flex; flex-direction:column;
}
#modal-header {
  padding:18px 22px; border-bottom:1px solid #21262d;
  display:flex; justify-content:space-between; align-items:flex-start;
}
#modal-title { font-size:17px; font-weight:700; margin-bottom:3px; }
#modal-meta { font-size:12px; color:#8b949e; }
#modal-close { cursor:pointer; font-size:18px; color:#8b949e; background:none; border:none; }
#modal-close:hover { color:#e6edf3; }
#modal-body { padding:14px 22px; overflow-y:auto; }
.news-card {
  padding:14px; border:1px solid #21262d; border-radius:8px;
  margin-bottom:10px; background:#0d1117; transition:border-color 0.2s;
}
.news-card:hover { border-color:#58a6ff; }
.news-card .card-title { font-size:14px; font-weight:600; margin-bottom:5px; }
.news-card .card-title a { color:#e6edf3; text-decoration:none; }
.news-card .card-title a:hover { color:#58a6ff; }
.news-card .card-date { font-size:11px; color:#8b949e; margin-bottom:7px; }
.news-card .card-summary { font-size:12px; color:#8b949e; line-height:1.6; }
.news-card .card-insight {
  font-size:12px; color:#3fb950; margin-top:8px; padding-top:8px;
  border-top:1px solid #21262d; line-height:1.5;
}
#loading { text-align:center; padding:60px; color:#8b949e; font-size:14px; }
</style>
</head>
<body>

<header>
  <h1>📊 뉴스 키워드 트렌드</h1>
  <span id="updated-at"></span>
</header>

<div id="stats">
  <div class="stat"><div class="num" id="stat-articles">-</div><div class="label">누적 뉴스</div></div>
  <div class="stat"><div class="num" id="stat-keywords">-</div><div class="label">추출 키워드</div></div>
</div>

<div id="controls">
  <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
  <button class="filter-btn" onclick="setFilter('top20',this)">TOP 20</button>
  <button class="filter-btn" onclick="setFilter('top50',this)">TOP 50</button>
  <input id="search" type="text" placeholder="키워드 검색..." oninput="renderAll()">
</div>

<div id="add-group-bar">
  <span>그룹 추가:</span>
  <input id="add-group-input" placeholder="그룹 이름..." onkeydown="if(event.key==='Enter')addGroup()">
  <input type="color" id="add-group-color" value="#58a6ff">
  <button id="add-group-btn" onclick="addGroup()">+ 추가</button>
</div>

<div id="dashboard">
  <div id="loading">⏳ 데이터 불러오는 중...</div>
</div>

<!-- 뉴스 모달 -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div id="modal-header">
      <div><div id="modal-title"></div><div id="modal-meta"></div></div>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const LS_GROUPS = 'ntt_groups_v2';
let allKeywords = [];
let autoGroupColors = {};
let currentFilter = 'all';
let dragKw = null;
let collapsedSections = new Set();

function loadGroups() {
  try { return JSON.parse(localStorage.getItem(LS_GROUPS)) || {}; } catch { return {}; }
}
function saveGroups(g) { localStorage.setItem(LS_GROUPS, JSON.stringify(g)); }

// ── 데이터 로드 ───────────────────────────────────
async function loadData() {
  try {
    const res = await fetch("news_db.json");
    if (!res.ok) throw new Error();
    const db = await res.json();

    document.getElementById('stat-articles').textContent = db.total_articles;
    document.getElementById('stat-keywords').textContent = db.total_keywords;
    document.getElementById('updated-at').textContent = '업데이트: ' + db.updated_at;

    autoGroupColors = db.group_colors || {};

    allKeywords = Object.entries(db.keywords || {})
      .map(([name, data]) => ({ name, count: data.count, autoGroup: data.group, articles: data.articles }))
      .sort((a, b) => b.count - a.count);

    renderAll();
  } catch(e) {
    document.getElementById('dashboard').innerHTML =
      '<div id="loading" style="color:#f85149">❌ news_db.json을 GitHub에 업로드해주세요.</div>';
  }
}

// ── 필터 ─────────────────────────────────────────
function getFiltered() {
  let kws = [...allKeywords];
  const q = document.getElementById('search').value;
  if (q) kws = kws.filter(k => k.name.includes(q));
  if (currentFilter === 'top20') kws = kws.slice(0, 20);
  if (currentFilter === 'top50') kws = kws.slice(0, 50);
  return kws;
}

function setFilter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// ── 전체 렌더 ─────────────────────────────────────
function renderAll() {
  const dashboard = document.getElementById('dashboard');
  const filtered = getFiltered();
  const groups = loadGroups();
  const html = [];

  // 1. 전체 키워드 섹션
  html.push(renderSection('__all__', '전체 키워드', '#58a6ff', filtered, null));

  // 2. 자동 그룹 섹션들
  const autoGroupNames = [...new Set(filtered.map(k => k.autoGroup).filter(Boolean))];
  autoGroupNames.forEach(g => {
    const color = autoGroupColors[g] || '#8b949e';
    const kws = filtered.filter(k => k.autoGroup === g);
    html.push(renderSection('auto__' + g, g, color, kws, null));
  });

  // 3. 수동 그룹 섹션들
  Object.entries(groups).forEach(([gname, gdata]) => {
    const kws = filtered.filter(k => gdata.keywords.includes(k.name));
    html.push(renderSection('manual__' + gname, gname, gdata.color, kws, gname));
  });

  dashboard.innerHTML = html.join('');

  // 드롭존 이벤트 등록
  dashboard.querySelectorAll('.section-body').forEach(zone => {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      const gname = zone.dataset.group;
      if (!gname || !dragKw) return;
      const groups = loadGroups();
      if (!groups[gname]) return;
      if (!groups[gname].keywords.includes(dragKw)) {
        groups[gname].keywords.push(dragKw);
        saveGroups(groups);
        renderAll();
      }
    });
  });

  // 버블 이벤트
  dashboard.querySelectorAll('.bubble').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragKw = el.dataset.kw;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => {
      dragKw = null;
      el.classList.remove('dragging');
    });
    el.addEventListener('click', e => {
      if (e.target.classList.contains('remove-btn')) return;
      showModal(el.dataset.kw);
    });
  });

  // 접기/펼치기
  dashboard.querySelectorAll('.section-header').forEach(header => {
    header.addEventListener('click', e => {
      if (e.target.classList.contains('section-delete')) return;
      const id = header.dataset.id;
      const body = header.nextElementSibling;
      const tog = header.querySelector('.section-toggle');
      if (collapsedSections.has(id)) {
        collapsedSections.delete(id);
        body.classList.remove('collapsed');
        tog.textContent = '▲';
      } else {
        collapsedSections.add(id);
        body.classList.add('collapsed');
        tog.textContent = '▼';
      }
    });
  });
}

function renderSection(id, title, color, keywords, manualGroupName) {
  const isCollapsed = collapsedSections.has(id);
  const isEmpty = keywords.length === 0;
  const maxC = allKeywords[0]?.count || 1;
  const minC = allKeywords[allKeywords.length-1]?.count || 1;

  const bubblesHtml = keywords.map(kw => {
    const ratio = maxC === minC ? 0.5 : (kw.count - minC) / (maxC - minC);
    const size = Math.round(60 + ratio * 100);
    const fontSize = Math.round(10 + ratio * 6);
    const c = manualGroupName ? color : (autoGroupColors[kw.autoGroup] || '#8b949e');
    const alpha = Math.round(30 + ratio * 55).toString(16).padStart(2,'0');
    const removeBtn = manualGroupName
      ? `<span class="remove-btn" onclick="removeFromGroup('${escJs(manualGroupName)}','${escJs(kw.name)}')">✕</span>`
      : '';
    return `<div class="bubble" data-kw="${escJs(kw.name)}" draggable="true"
      style="width:${size}px;height:${size}px;font-size:${fontSize}px;
             background:${c+alpha};border:1.5px solid ${c}99;color:#e6edf3;">
      ${removeBtn}
      <div>
        <span class="kw-name">${kw.name}</span>
        <span class="kw-count">${kw.count}회</span>
      </div>
    </div>`;
  }).join('');

  const deleteBtn = manualGroupName
    ? `<button class="section-delete" onclick="deleteGroup('${escJs(manualGroupName)}')">🗑 삭제</button>`
    : '';

  return `<div class="section">
    <div class="section-header" data-id="${escJs(id)}">
      <div class="section-color-bar" style="background:${color}"></div>
      <div class="section-title">${title}</div>
      <div class="section-count">${keywords.length}개</div>
      ${deleteBtn}
      <span class="section-toggle">${isCollapsed ? '▼' : '▲'}</span>
    </div>
    <div class="section-body ${isCollapsed?'collapsed':''} ${isEmpty&&manualGroupName?'empty':''}"
         data-group="${manualGroupName||''}">
      ${bubblesHtml}
    </div>
  </div>`;
}

// ── 그룹 조작 ─────────────────────────────────────
function addGroup() {
  const name = document.getElementById('add-group-input').value.trim();
  const color = document.getElementById('add-group-color').value;
  if (!name) return;
  const groups = loadGroups();
  if (groups[name]) { alert('이미 있는 그룹 이름이에요.'); return; }
  groups[name] = { color, keywords: [] };
  saveGroups(groups);
  document.getElementById('add-group-input').value = '';
  renderAll();
}

function deleteGroup(name) {
  if (!confirm(`"${name}" 그룹을 삭제할까요?`)) return;
  const groups = loadGroups();
  delete groups[name];
  saveGroups(groups);
  renderAll();
}

function removeFromGroup(gname, kw) {
  const groups = loadGroups();
  if (!groups[gname]) return;
  groups[gname].keywords = groups[gname].keywords.filter(k => k !== kw);
  saveGroups(groups);
  renderAll();
}

// ── 뉴스 모달 ─────────────────────────────────────
function showModal(name) {
  const kw = allKeywords.find(k => k.name === name);
  if (!kw) return;
  const color = autoGroupColors[kw.autoGroup] || '#8b949e';
  document.getElementById('modal-title').innerHTML = `<span style="color:${color}">#</span> ${name}`;
  document.getElementById('modal-meta').textContent = `${kw.autoGroup||'미분류'} · 총 ${kw.count}회 · ${kw.articles.length}건`;
  document.getElementById('modal-body').innerHTML = kw.articles.map(a => `
    <div class="news-card">
      <div class="card-title">${a.url?`<a href="${a.url}" target="_blank">🔗 ${a.title}</a>`:a.title}</div>
      <div class="card-date">📅 ${a.date}</div>
      <div class="card-summary">${(a.summary||'').replace(/\n/g,'<br>')}</div>
      ${a.insight?`<div class="card-insight">📈 ${(a.insight||'').replace(/\n/g,'<br>')}</div>`:''}
    </div>`).join('');
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }

function escJs(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

loadData();
</script>
</body>
</html>
