<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴스 키워드 트렌드</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#e6edf3; font-family:'Segoe UI',sans-serif; }

header {
  padding:10px 20px; border-bottom:1px solid #21262d;
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
header h1 { font-size:16px; font-weight:700; }
#updated-at { font-size:11px; color:#8b949e; }

#stats { display:flex; gap:16px; padding:8px 20px; border-bottom:1px solid #21262d; align-items:center; }
.stat { display:flex; align-items:baseline; gap:5px; }
.stat .num { font-size:18px; font-weight:700; color:#58a6ff; }
.stat .label { font-size:11px; color:#8b949e; }

#toolbar {
  padding:8px 20px; display:flex; gap:6px; align-items:center; flex-wrap:wrap;
  border-bottom:1px solid #21262d;
}
.filter-btn {
  padding:3px 10px; border-radius:20px; border:1px solid #30363d;
  background:#161b22; color:#8b949e; cursor:pointer; font-size:11px; transition:all 0.2s;
}
.filter-btn.active { background:#58a6ff; color:#0d1117; border-color:#58a6ff; }
.filter-btn:hover:not(.active) { border-color:#58a6ff; color:#58a6ff; }
.group-filter-btn {
  padding:3px 10px; border-radius:20px; border:1px solid transparent;
  background:transparent; cursor:pointer; font-size:11px; transition:all 0.2s;
  font-weight:600;
}
.group-filter-btn.active { opacity:1 !important; }
.group-filter-btn:not(.active) { opacity:0.45; }
.group-filter-btn:hover { opacity:1 !important; }
#search {
  padding:3px 10px; border-radius:20px; border:1px solid #30363d;
  background:#161b22; color:#e6edf3; font-size:11px; width:130px; outline:none;
}
#search:focus { border-color:#58a6ff; }
.sep { width:1px; height:18px; background:#21262d; flex-shrink:0; }

#add-group-bar {
  padding:7px 20px; display:flex; gap:6px; align-items:center;
  border-bottom:1px solid #21262d; background:#0a0d12;
}
#add-group-bar span { font-size:11px; color:#8b949e; }
#new-group-input {
  padding:3px 10px; border-radius:6px; border:1px solid #30363d;
  background:#161b22; color:#e6edf3; font-size:11px; width:140px; outline:none;
}
#new-group-input:focus { border-color:#3fb950; }
#new-group-color { width:26px; height:22px; border:none; border-radius:4px; cursor:pointer; padding:1px; }
#new-group-btn {
  padding:3px 10px; border-radius:6px; border:none; background:#238636;
  color:#fff; cursor:pointer; font-size:11px; font-weight:600;
}
#new-group-btn:hover { background:#2ea043; }

#heatmap {
  margin:12px 20px; display:flex; flex-wrap:wrap; gap:8px;
  align-items:flex-start; align-content:flex-start;
}

.sector {
  border:1px solid #30363d; border-radius:8px; overflow:hidden; flex-shrink:0;
}
.sector.manual-sector { border-style:dashed; border-width:1.5px; }
.sector.drag-over { background:#1c2128 !important; outline:2px dashed #58a6ff; outline-offset:-2px; }

.sector-label {
  padding:5px 8px; font-size:10px; font-weight:700; letter-spacing:0.4px;
  text-transform:uppercase; border-bottom:1px solid #21262d;
  display:flex; align-items:center; gap:5px; background:#0a0d12; user-select:none;
}
.label-text { flex:1; }
.sector-count { opacity:.5; font-weight:400; }
.sector-del { background:none; border:none; color:#30363d; cursor:pointer; font-size:10px; padding:0 2px; }
.sector-del:hover { color:#f85149; }

.sector-body {
  padding:8px; display:flex; flex-wrap:wrap; gap:6px; align-content:flex-start;
}
.sector-body.grid-layout {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(68px, 1fr)); gap:5px;
}
.sector-body .empty-hint { font-size:11px; color:#30363d; padding:4px; align-self:center; }

.bubble {
  border-radius:6px; display:flex; align-items:center; justify-content:center;
  cursor:grab; font-weight:700; text-align:center; padding:4px; flex-shrink:0;
  user-select:none; transition:filter 0.12s, transform 0.12s; position:relative; line-height:1.2;
}
.bubble:hover { filter:brightness(1.2); transform:scale(1.05); z-index:10; }
.bubble.dragging { opacity:0.3; cursor:grabbing; }
.bubble.drop-target { outline:2px solid #f78166; outline-offset:1px; }
.bubble .kw-name { display:block; pointer-events:none; }
.bubble .kw-count { display:block; opacity:0.7; pointer-events:none; }
.bubble .rm {
  display:none; position:absolute; top:-4px; right:-4px;
  width:14px; height:14px; border-radius:50%; background:#f85149;
  color:#fff; font-size:8px; line-height:14px; text-align:center;
  cursor:pointer; pointer-events:all; z-index:20; font-weight:900;
}
.bubble:hover .rm { display:block; }

/* 이름 편집 */
.kw-name-edit {
  display:block; pointer-events:all; cursor:text; outline:none;
  min-width:20px; word-break:break-all;
  border-bottom:1px solid transparent;
}
.kw-name-edit:focus {
  border-bottom:1px solid rgba(255,255,255,0.6);
  background:rgba(0,0,0,0.25); border-radius:2px; padding:0 2px;
}

#drag-hint {
  display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:#161b22; border:1px solid #58a6ff; border-radius:8px;
  padding:7px 16px; font-size:12px; color:#58a6ff; z-index:500; pointer-events:none;
}

#modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8);
  z-index:300; align-items:center; justify-content:center;
}
#modal-overlay.show { display:flex; }
#modal {
  background:#161b22; border:1px solid #30363d; border-radius:12px;
  width:740px; max-width:96vw; max-height:84vh; display:flex; flex-direction:column;
}
#modal-header {
  padding:16px 20px; border-bottom:1px solid #21262d;
  display:flex; justify-content:space-between; align-items:flex-start;
}
#modal-title { font-size:16px; font-weight:700; margin-bottom:2px; }
#modal-meta { font-size:11px; color:#8b949e; }
#modal-close { cursor:pointer; font-size:16px; color:#8b949e; background:none; border:none; }
#modal-close:hover { color:#e6edf3; }
#modal-body { padding:12px 20px; overflow-y:auto; }
.news-card { padding:12px; border:1px solid #21262d; border-radius:8px; margin-bottom:8px; background:#0d1117; }
.news-card:hover { border-color:#58a6ff; }
.card-title { font-size:13px; font-weight:600; margin-bottom:4px; }
.card-title a { color:#e6edf3; text-decoration:none; }
.card-title a:hover { color:#58a6ff; }
.card-date { font-size:11px; color:#8b949e; margin-bottom:6px; }
.card-summary { font-size:12px; color:#8b949e; line-height:1.6; }
.card-insight { font-size:11px; color:#3fb950; margin-top:6px; padding-top:6px; border-top:1px solid #21262d; line-height:1.5; }
</style>
</head>
<body>

<header>
  <h1>📊 뉴스 키워드 히트맵</h1>
  <span id="updated-at"></span>
</header>

<div id="stats">
  <div class="stat"><span class="num" id="stat-articles">-</span><span class="label">누적 뉴스</span></div>
  <div class="stat"><span class="num" id="stat-keywords">-</span><span class="label">키워드</span></div>
</div>

<div id="toolbar">
  <button class="filter-btn active" onclick="setCountFilter('all',this)">전체</button>
  <button class="filter-btn" onclick="setCountFilter('top30',this)">TOP 30</button>
  <button class="filter-btn" onclick="setCountFilter('top60',this)">TOP 60</button>
  <input id="search" type="text" placeholder="키워드 검색..." oninput="render()">
  <div class="sep"></div>
  <div id="group-filter-btns" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
</div>

<div id="add-group-bar">
  <span>+ 새 그룹:</span>
  <input id="new-group-input" placeholder="그룹 이름..." onkeydown="if(event.key==='Enter')addGroup()">
  <input type="color" id="new-group-color" value="#f78166">
  <button id="new-group-btn" onclick="addGroup()">추가</button>
</div>

<div id="heatmap"></div>
<div id="drag-hint">🎯 섹터에 드롭 | 버블 위에 드롭하면 합치기</div>

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div id="modal-header">
      <div><div id="modal-title"></div><div id="modal-meta"></div></div>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const LS       = 'ntt_v5_groups';
const LS_DISM  = 'ntt_v5_dismissed';
const LS_MERGE = 'ntt_v5_merge';   // { groupName: { masterKw: [aliasKws] } }
const LS_ALIAS = 'ntt_v5_alias';   // { originalKw: displayName }

let DB = {}, allKws = [], countFilter = 'all', groupFilter = null, dragKw = null;

const getGroups  = () => { try { return JSON.parse(localStorage.getItem(LS))       || {}; } catch { return {}; } };
const setGroups  = g => localStorage.setItem(LS, JSON.stringify(g));
const getDism    = () => { try { return JSON.parse(localStorage.getItem(LS_DISM))  || {}; } catch { return {}; } };
const setDism    = d => localStorage.setItem(LS_DISM, JSON.stringify(d));
const getMerge   = () => { try { return JSON.parse(localStorage.getItem(LS_MERGE)) || {}; } catch { return {}; } };
const setMerge   = m => localStorage.setItem(LS_MERGE, JSON.stringify(m));
const getAlias   = () => { try { return JSON.parse(localStorage.getItem(LS_ALIAS)) || {}; } catch { return {}; } };
const setAlias   = a => localStorage.setItem(LS_ALIAS, JSON.stringify(a));

// 표시 이름
const dispName = kw => getAlias()[kw] || kw;

// 특정 그룹에서 kw의 합산 카운트 (alias 포함)
function mergedCount(gname, masterKw) {
  const merge = getMerge();
  const aliases = merge[gname]?.[masterKw] || [];
  const allNames = [masterKw, ...aliases];
  return allNames.reduce((sum, n) => {
    const found = allKws.find(k => k.name === n);
    return sum + (found?.count || 0);
  }, 0);
}

// 특정 그룹에서 kw의 합산 articles
function mergedArticles(gname, masterKw) {
  const merge = getMerge();
  const aliases = merge[gname]?.[masterKw] || [];
  const allNames = [masterKw, ...aliases];
  const seen = new Set();
  const arts = [];
  allNames.forEach(n => {
    const found = allKws.find(k => k.name === n);
    (found?.articles || []).forEach(a => {
      if (!seen.has(a.title)) { seen.add(a.title); arts.push(a); }
    });
  });
  return arts.sort((a,b) => b.date.localeCompare(a.date));
}

async function init() {
  try {
    const res = await fetch('news_db.json');
    if (!res.ok) throw new Error();
    DB = await res.json();
    document.getElementById('stat-articles').textContent = DB.total_articles;
    document.getElementById('stat-keywords').textContent = DB.total_keywords;
    document.getElementById('updated-at').textContent = '업데이트: ' + DB.updated_at;
    allKws = Object.entries(DB.keywords || {})
      .map(([name, d]) => ({ name, count: d.count, articles: d.articles }))
      .sort((a, b) => b.count - a.count);
    render();
  } catch {
    document.getElementById('heatmap').innerHTML =
      '<div style="padding:60px;text-align:center;color:#f85149">❌ news_db.json을 GitHub에 업로드해주세요.</div>';
  }
}

function getFiltered() {
  let kws = [...allKws];
  const q = document.getElementById('search').value.trim();
  if (q) kws = kws.filter(k => k.name.includes(q) || dispName(k.name).includes(q));
  if (countFilter === 'top30') kws = kws.slice(0, 30);
  if (countFilter === 'top60') kws = kws.slice(0, 60);
  return kws;
}

function setCountFilter(t, btn) {
  countFilter = t;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); render();
}

function render() {
  const hm = document.getElementById('heatmap');
  const filtered = getFiltered();
  const groups = getGroups();
  const dism = getDism();
  const merge = getMerge();
  const maxC = allKws[0]?.count || 1;
  const minC = allKws[allKws.length-1]?.count || 1;

  renderGroupFilterBtns(groups);

  // 섹터별 분류
  const manualSectors = {};
  Object.keys(groups).forEach(g => { manualSectors[g] = []; });
  const etcKws = [];

  // alias인 키워드 목록 (그룹별로 master에 묶인 것들)
  const aliasedInGroup = {}; // groupName -> Set of aliased kw names
  Object.entries(merge).forEach(([gname, masters]) => {
    if (!aliasedInGroup[gname]) aliasedInGroup[gname] = new Set();
    Object.values(masters).flat().forEach(a => aliasedInGroup[gname].add(a));
  });

  filtered.forEach(kw => {
    const inManual = Object.entries(groups).filter(([,gd]) => gd.keywords.includes(kw.name)).map(([g]) => g);
    if (inManual.length) {
      inManual.forEach(g => {
        // alias로 묶인 것은 제외 (master만 표시)
        if (!aliasedInGroup[g]?.has(kw.name)) manualSectors[g].push(kw);
      });
    } else if (!dism[kw.name]) {
      etcKws.push(kw);
    }
  });

  function makeBubble(kw, color, count, removeFn, gname) {
    const ratio = maxC === minC ? 0.5 : (count - minC) / (maxC - minC);
    const size = Math.round(52 + ratio * 80);
    const fs   = Math.round(9 + ratio * 5);
    const cfs  = Math.round(fs * 0.75);
    const alpha = Math.round(35 + ratio * 60).toString(16).padStart(2,'0');
    const rm = removeFn ? `<span class="rm" onclick="${removeFn}">✕</span>` : '';
    const name = dispName(kw.name);
    // alias 배지
    const aliases = gname ? (merge[gname]?.[kw.name] || []) : [];
    const badge = aliases.length
      ? `<span style="position:absolute;top:-5px;left:-5px;background:#f78166;color:#fff;
           font-size:8px;border-radius:10px;padding:1px 4px;font-weight:900;pointer-events:none">
           +${aliases.length}</span>`
      : '';
    return `<div class="bubble" data-kw="${escJ(kw.name)}" data-gname="${escJ(gname||'')}" draggable="true"
      style="width:${size}px;height:${size}px;font-size:${fs}px;
             background:${color+alpha};border:1.5px solid ${color}88;color:#e6edf3;">
      ${rm}${badge}
      <div>
        <span class="kw-name-edit" contenteditable="true"
          onblur="onRename('${escJ(kw.name)}',this)"
          onclick="event.stopPropagation()">${name}</span>
        <span class="kw-count" style="font-size:${cfs}px">${count}회</span>
      </div>
    </div>`;
  }

  function renderSector(label, color, kws, isManual) {
    if (groupFilter && groupFilter !== label) return '';
    const delBtn = isManual ? `<button class="sector-del" onclick="deleteGroup('${escJ(label)}')">✕</button>` : '';
    const droppable = isManual ? `data-manual="${escJ(label)}"` : '';
    const isEtc = label === '기타';
    const gridCls = isEtc ? 'grid-layout' : '';
    const minW = isEtc ? `min-width:min(calc(100vw - 40px), 900px)` : 'min-width:110px';
    const maxH = isEtc ? 'max-height:320px;overflow-y:auto;' : '';

    let bodyHtml = '';
    if (!kws.length && isManual) {
      bodyHtml = '<span class="empty-hint">드래그해서 추가</span>';
    } else {
      kws.forEach(kw => {
        const count = isManual ? mergedCount(label, kw.name) : kw.count;
        const rm = isManual ? `removeFromManual('${escJ(label)}','${escJ(kw.name)}')` : (isEtc ? '' : `dismissKw('${escJ(kw.name)}')`);
        bodyHtml += makeBubble(kw, color, count, rm || null, isManual ? label : null);
      });
    }

    return `<div class="sector ${isManual?'manual-sector':''}" ${droppable}
      style="border-color:${color}${isManual?'':'44'};${minW}">
      <div class="sector-label" style="color:${color}">
        <span class="label-text">${label}</span>
        <span class="sector-count">${kws.length}</span>
        ${delBtn}
      </div>
      <div class="sector-body ${gridCls}" style="${maxH}">${bodyHtml}</div>
    </div>`;
  }

  let html = '';
  Object.entries(manualSectors).forEach(([g, kws]) => {
    html += renderSector(g, groups[g]?.color || '#58a6ff', kws, true);
  });
  if (etcKws.length && (!groupFilter || groupFilter === '기타')) {
    html += renderSector('기타', '#8b949e', etcKws, false);
  }
  hm.innerHTML = html || '<div style="padding:40px;color:#8b949e;text-align:center">키워드 없음</div>';

  // 버블 이벤트
  hm.querySelectorAll('.bubble').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragKw = el.dataset.kw;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      document.getElementById('drag-hint').style.display = 'block';
    });
    el.addEventListener('dragend', () => {
      dragKw = null;
      el.classList.remove('dragging');
      document.getElementById('drag-hint').style.display = 'none';
      hm.querySelectorAll('.bubble.drop-target').forEach(b => b.classList.remove('drop-target'));
    });
    // 버블 위에 드래그 (합치기 힌트)
    el.addEventListener('dragover', e => {
      e.preventDefault(); e.stopPropagation();
      if (dragKw && dragKw !== el.dataset.kw && el.dataset.gname) {
        el.classList.add('drop-target');
      }
    });
    el.addEventListener('dragleave', () => el.classList.remove('drop-target'));
    el.addEventListener('drop', e => {
      e.preventDefault(); e.stopPropagation();
      el.classList.remove('drop-target');
      const masterKw = el.dataset.kw;
      const gname = el.dataset.gname;
      if (!dragKw || dragKw === masterKw || !gname) return;
      // 합치기: dragKw를 masterKw의 alias로 등록
      const m = getMerge();
      if (!m[gname]) m[gname] = {};
      if (!m[gname][masterKw]) m[gname][masterKw] = [];
      if (!m[gname][masterKw].includes(dragKw)) m[gname][masterKw].push(dragKw);
      setMerge(m);
      render();
    });
    el.addEventListener('click', e => {
      if (e.target.classList.contains('rm')) return;
      if (e.target.classList.contains('kw-name-edit')) return;
      showModal(el.dataset.kw, el.dataset.gname);
    });
  });

  // 수동 섹터 드롭
  hm.querySelectorAll('.sector[data-manual]').forEach(sec => {
    sec.addEventListener('dragover', e => { e.preventDefault(); sec.classList.add('drag-over'); });
    sec.addEventListener('dragleave', e => { if (!sec.contains(e.relatedTarget)) sec.classList.remove('drag-over'); });
    sec.addEventListener('drop', e => {
      e.preventDefault(); sec.classList.remove('drag-over');
      if (!dragKw) return;
      const gname = sec.dataset.manual;
      const g = getGroups();
      if (!g[gname]) return;
      if (!g[gname].keywords.includes(dragKw)) {
        g[gname].keywords.push(dragKw);
        setGroups(g);
        const d = getDism(); delete d[dragKw]; setDism(d);
        render();
      }
    });
  });
}

function renderGroupFilterBtns(groups) {
  const c = document.getElementById('group-filter-btns');
  let h = `<button class="group-filter-btn ${!groupFilter?'active':''}"
    style="color:#8b949e;border:1px solid #30363d;border-radius:20px;background:${!groupFilter?'#21262d':'transparent'}"
    onclick="setGroupFilter(null)">전체보기</button>`;
  Object.entries(groups).forEach(([gname, gdata]) => {
    const col = gdata.color;
    h += `<button class="group-filter-btn ${groupFilter===gname?'active':''}"
      style="color:${col};border:1px solid ${col}66;border-radius:20px;background:${groupFilter===gname?col+'22':'transparent'}"
      onclick="setGroupFilter('${escJ(gname)}')">${gname}</button>`;
  });
  h += `<button class="group-filter-btn ${groupFilter==='기타'?'active':''}"
    style="color:#8b949e;border:1px solid #30363d;border-radius:20px;background:${groupFilter==='기타'?'#21262d':'transparent'}"
    onclick="setGroupFilter('기타')">기타</button>`;
  c.innerHTML = h;
}

function setGroupFilter(g) { groupFilter = g; render(); }

// 키워드 이름 변경 → 같은 이름이면 alias로 자동 합산 (표시만, DB는 안 바꿈)
function onRename(original, el) {
  const newName = el.textContent.trim();
  if (!newName || newName === dispName(original)) return;
  const a = getAlias();
  a[original] = newName;
  setAlias(a);
  render();
}

function dismissKw(kw) { const d = getDism(); d[kw] = true; setDism(d); render(); }

function removeFromManual(gname, kw) {
  const g = getGroups();
  if (!g[gname]) return;
  g[gname].keywords = g[gname].keywords.filter(k => k !== kw);
  setGroups(g);
  // merge에서도 제거
  const m = getMerge();
  if (m[gname]) {
    delete m[gname][kw];
    Object.keys(m[gname]).forEach(mk => { m[gname][mk] = m[gname][mk].filter(k => k !== kw); });
    setMerge(m);
  }
  const stillIn = Object.values(g).some(gd => gd.keywords.includes(kw));
  if (!stillIn) { const d = getDism(); d[kw] = true; setDism(d); }
  render();
}

function addGroup() {
  const name = document.getElementById('new-group-input').value.trim();
  const color = document.getElementById('new-group-color').value;
  if (!name) return;
  const g = getGroups();
  if (g[name]) { alert('이미 있는 이름이에요.'); return; }
  g[name] = { color, keywords: [] };
  setGroups(g);
  document.getElementById('new-group-input').value = '';
  render();
}

function deleteGroup(name) {
  if (!confirm(`"${name}" 그룹을 삭제할까요?`)) return;
  const g = getGroups(); delete g[name]; setGroups(g);
  const m = getMerge(); delete m[name]; setMerge(m);
  render();
}

function showModal(name, gname) {
  const kw = allKws.find(k => k.name === name);
  if (!kw) return;
  const count = gname ? mergedCount(gname, name) : kw.count;
  const arts  = gname ? mergedArticles(gname, name) : kw.articles;
  const aliases = gname ? (getMerge()[gname]?.[name] || []) : [];
  const aliasLabel = aliases.length ? ` (+${aliases.map(dispName).join(', ')})` : '';
  document.getElementById('modal-title').innerHTML = `<span style="color:#58a6ff">#</span> ${dispName(name)}${aliasLabel}`;
  document.getElementById('modal-meta').textContent = `${count}회 언급 · ${arts.length}건`;
  document.getElementById('modal-body').innerHTML = arts.map(a => `
    <div class="news-card">
      <div class="card-title">${a.url?`<a href="${a.url}" target="_blank">🔗 ${a.title}</a>`:a.title}</div>
      <div class="card-date">📅 ${a.date}</div>
      <div class="card-summary">${(a.summary||'').replace(/\n/g,'<br>')}</div>
      ${a.insight?`<div class="card-insight">📈 ${(a.insight||'').replace(/\n/g,'<br>')}</div>`:''}
    </div>`).join('');
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }
function escJ(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

init();
</script>
