<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴스 키워드 트렌드</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#e6edf3; font-family:'Segoe UI',sans-serif; overflow-x:hidden; }

header {
  padding:10px 20px; border-bottom:1px solid #21262d;
  display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
}
header h1 { font-size:16px; font-weight:700; }
.header-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
#updated-at { font-size:11px; color:#8b949e; }

#stats { display:flex; gap:16px; padding:8px 20px; border-bottom:1px solid #21262d; align-items:center; }
.stat { display:flex; align-items:baseline; gap:5px; }
.stat .num { font-size:18px; font-weight:700; color:#58a6ff; }
.stat .label { font-size:11px; color:#8b949e; }

#toolbar {
  padding:8px 20px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;
  border-bottom:1px solid #21262d; background:#0d1117;
}
.filter-btn {
  padding:3px 10px; border-radius:20px; border:1px solid #30363d;
  background:#161b22; color:#8b949e; cursor:pointer; font-size:11px; transition:all 0.2s;
}
.filter-btn.active,.filter-btn:hover { background:#58a6ff; color:#0d1117; border-color:#58a6ff; }
#search {
  padding:3px 10px; border-radius:20px; border:1px solid #30363d;
  background:#161b22; color:#e6edf3; font-size:11px; width:140px; outline:none;
}
#search:focus { border-color:#58a6ff; }
.sep { width:1px; height:20px; background:#21262d; }
#new-group-input {
  padding:3px 10px; border-radius:6px; border:1px solid #30363d;
  background:#161b22; color:#e6edf3; font-size:11px; width:130px; outline:none;
}
#new-group-input:focus { border-color:#3fb950; }
#new-group-color { width:28px; height:24px; border:none; border-radius:4px; cursor:pointer; padding:1px; }
#new-group-btn {
  padding:3px 10px; border-radius:6px; border:none; background:#238636;
  color:#fff; cursor:pointer; font-size:11px; font-weight:600;
}
#new-group-btn:hover { background:#2ea043; }

/* 히트맵 캔버스 */
#heatmap {
  margin:12px 20px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:flex-start;
  align-content:flex-start;
}

/* 섹터 블록 */
.sector {
  border:1px solid #30363d;
  border-radius:8px;
  overflow:hidden;
  flex-shrink:0;
  min-width:120px;
  transition:border-color 0.2s;
}
.sector.manual-sector { border-style:dashed; }
.sector.drag-over { border-color:#58a6ff !important; background:#1c2128; }

.sector-label {
  padding:5px 8px;
  font-size:10px;
  font-weight:700;
  letter-spacing:0.5px;
  text-transform:uppercase;
  border-bottom:1px solid #21262d;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
  color:#8b949e;
  background:#0d1117;
  cursor:default;
  user-select:none;
}
.sector-label .label-text { flex:1; }
.sector-label .sector-del {
  background:none; border:none; color:#30363d; cursor:pointer; font-size:11px; padding:0 2px;
  line-height:1;
}
.sector-label .sector-del:hover { color:#f85149; }

.sector-body {
  padding:6px;
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  min-height:50px;
  align-content:flex-start;
}

/* 버블 */
.bubble {
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:grab;
  font-weight:700;
  text-align:center;
  padding:4px;
  flex-shrink:0;
  user-select:none;
  transition:filter 0.12s, transform 0.12s;
  position:relative;
  line-height:1.2;
}
.bubble:hover { filter:brightness(1.2); transform:scale(1.05); z-index:10; }
.bubble.dragging { opacity:0.3; cursor:grabbing; }
.bubble .kw-name { display:block; pointer-events:none; }
.bubble .kw-count { display:block; opacity:0.7; pointer-events:none; }
.bubble .rm {
  display:none; position:absolute; top:-4px; right:-4px;
  width:14px; height:14px; border-radius:50%; background:#f85149;
  color:#fff; font-size:8px; line-height:14px; text-align:center;
  cursor:pointer; pointer-events:all; z-index:20; font-weight:900;
}
.bubble:hover .rm { display:block; }

/* 드래그 힌트 */
#drag-hint {
  display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:#161b22; border:1px solid #58a6ff; border-radius:8px;
  padding:8px 16px; font-size:12px; color:#58a6ff; z-index:500;
  pointer-events:none;
}

/* 뉴스 모달 */
#modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8);
  z-index:300; align-items:center; justify-content:center;
}
#modal-overlay.show { display:flex; }
#modal {
  background:#161b22; border:1px solid #30363d; border-radius:12px;
  width:740px; max-width:96vw; max-height:84vh; display:flex; flex-direction:column;
}
#modal-header {
  padding:16px 20px; border-bottom:1px solid #21262d;
  display:flex; justify-content:space-between; align-items:flex-start;
}
#modal-title { font-size:16px; font-weight:700; margin-bottom:2px; }
#modal-meta { font-size:11px; color:#8b949e; }
#modal-close { cursor:pointer; font-size:16px; color:#8b949e; background:none; border:none; }
#modal-close:hover { color:#e6edf3; }
#modal-body { padding:12px 20px; overflow-y:auto; }
.news-card {
  padding:12px; border:1px solid #21262d; border-radius:8px;
  margin-bottom:8px; background:#0d1117;
}
.news-card:hover { border-color:#58a6ff; }
.card-title { font-size:13px; font-weight:600; margin-bottom:4px; }
.card-title a { color:#e6edf3; text-decoration:none; }
.card-title a:hover { color:#58a6ff; }
.card-date { font-size:11px; color:#8b949e; margin-bottom:6px; }
.card-summary { font-size:12px; color:#8b949e; line-height:1.6; }
.card-insight { font-size:11px; color:#3fb950; margin-top:6px; padding-top:6px; border-top:1px solid #21262d; line-height:1.5; }

#no-data { text-align:center; padding:60px; color:#8b949e; }
</style>
</head>
<body>

<header>
  <h1>📊 뉴스 키워드 히트맵</h1>
  <div class="header-right">
    <span id="updated-at"></span>
  </div>
</header>

<div id="stats">
  <div class="stat"><span class="num" id="stat-articles">-</span><span class="label">누적 뉴스</span></div>
  <div class="stat"><span class="num" id="stat-keywords">-</span><span class="label">키워드</span></div>
</div>

<div id="toolbar">
  <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
  <button class="filter-btn" onclick="setFilter('top30',this)">TOP 30</button>
  <button class="filter-btn" onclick="setFilter('top60',this)">TOP 60</button>
  <input id="search" type="text" placeholder="키워드 검색..." oninput="renderHeatmap()">
  <div class="sep"></div>
  <span style="font-size:11px;color:#8b949e">그룹 추가:</span>
  <input id="new-group-input" placeholder="그룹 이름..." onkeydown="if(event.key==='Enter')addGroup()">
  <input type="color" id="new-group-color" value="#f78166">
  <button id="new-group-btn" onclick="addGroup()">+ 추가</button>
</div>

<div id="heatmap"><div id="no-data">⏳ 로딩 중...</div></div>
<div id="drag-hint">🎯 그룹 섹션에 드롭하세요</div>

<!-- 뉴스 모달 -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div id="modal-header">
      <div><div id="modal-title"></div><div id="modal-meta"></div></div>
      <button id="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const LS = 'ntt_heatmap_v1';
let DB = {};
let allKws = [];
let currentFilter = 'all';
let dragKw = null;

// ── localStorage ──────────────────────────────────
function getGroups() { try { return JSON.parse(localStorage.getItem(LS)) || {}; } catch { return {}; } }
function setGroups(g) { localStorage.setItem(LS, JSON.stringify(g)); }

// ── 데이터 로드 ───────────────────────────────────
async function init() {
  try {
    const res = await fetch('news_db.json');
    if (!res.ok) throw new Error();
    DB = await res.json();
    document.getElementById('stat-articles').textContent = DB.total_articles;
    document.getElementById('stat-keywords').textContent = DB.total_keywords;
    document.getElementById('updated-at').textContent = '업데이트: ' + DB.updated_at;
    allKws = Object.entries(DB.keywords || {})
      .map(([name, d]) => ({ name, count: d.count, autoGroup: d.group, articles: d.articles }))
      .sort((a, b) => b.count - a.count);
    renderHeatmap();
  } catch {
    document.getElementById('heatmap').innerHTML = '<div id="no-data" style="color:#f85149">❌ news_db.json을 GitHub에 업로드해주세요.</div>';
  }
}

// ── 필터 ─────────────────────────────────────────
function getFiltered() {
  let kws = [...allKws];
  const q = document.getElementById('search').value.trim();
  if (q) kws = kws.filter(k => k.name.includes(q));
  if (currentFilter === 'top30') kws = kws.slice(0, 30);
  if (currentFilter === 'top60') kws = kws.slice(0, 60);
  return kws;
}
function setFilter(t, btn) {
  currentFilter = t;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHeatmap();
}

// ── 히트맵 렌더 ──────────────────────────────────
function renderHeatmap() {
  const hm = document.getElementById('heatmap');
  const filtered = getFiltered();
  const groups = getGroups();
  const autoGroupColors = DB.group_colors || {};

  if (!filtered.length) { hm.innerHTML = '<div id="no-data">검색 결과 없음</div>'; return; }

  const maxC = allKws[0]?.count || 1;
  const minC = allKws[allKws.length - 1]?.count || 1;

  function bubbleHtml(kw, sectorColor, showRemove, gname) {
    const ratio = maxC === minC ? 0.5 : (kw.count - minC) / (maxC - minC);
    const size = Math.round(52 + ratio * 90);
    const fs = Math.round(9 + ratio * 6);
    const countFs = Math.round(fs * 0.72);
    const alpha = Math.round(35 + ratio * 60).toString(16).padStart(2,'0');
    const c = sectorColor;
    const rm = showRemove
      ? `<span class="rm" onclick="removeKw('${escJ(gname)}','${escJ(kw.name)}')">✕</span>`
      : '';
    return `<div class="bubble" data-kw="${escJ(kw.name)}" draggable="true"
      style="width:${size}px;height:${size}px;font-size:${fs}px;
             background:${c+alpha};border:1.5px solid ${c}88;color:#e6edf3;">
      ${rm}
      <div>
        <span class="kw-name">${kw.name}</span>
        <span class="kw-count" style="font-size:${countFs}px">${kw.count}회</span>
      </div>
    </div>`;
  }

  let html = '';

  // 1. 자동 그룹 섹터들
  const autoGroupNames = [...new Set(filtered.map(k => k.autoGroup).filter(Boolean))];
  autoGroupNames.forEach(g => {
    const color = autoGroupColors[g] || '#8b949e';
    const kws = filtered.filter(k => k.autoGroup === g);
    if (!kws.length) return;
    html += `<div class="sector" data-sector="${escJ(g)}" style="border-color:${color}44">
      <div class="sector-label" style="color:${color}">
        <span class="label-text">${g}</span>
        <span style="opacity:.5">${kws.length}</span>
      </div>
      <div class="sector-body">${kws.map(k => bubbleHtml(k, color, false, null)).join('')}</div>
    </div>`;
  });

  // 2. 수동 그룹 섹터들
  Object.entries(groups).forEach(([gname, gdata]) => {
    const color = gdata.color;
    const kws = filtered.filter(k => gdata.keywords.includes(k.name));
    html += `<div class="sector manual-sector" data-sector="${escJ(gname)}" data-manual="${escJ(gname)}" style="border-color:${color}">
      <div class="sector-label" style="color:${color}">
        <span class="label-text">${gname}</span>
        <span style="opacity:.5">${kws.length}</span>
        <button class="sector-del" onclick="deleteGroup('${escJ(gname)}')">✕</button>
      </div>
      <div class="sector-body ${kws.length===0?'':''}">
        ${kws.length === 0
          ? '<span style="font-size:11px;color:#30363d;padding:4px">드래그해서 추가</span>'
          : kws.map(k => bubbleHtml(k, color, true, gname)).join('')}
      </div>
    </div>`;
  });

  hm.innerHTML = html;

  // 버블 이벤트
  hm.querySelectorAll('.bubble').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragKw = el.dataset.kw;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      document.getElementById('drag-hint').style.display = 'block';
    });
    el.addEventListener('dragend', () => {
      dragKw = null;
      el.classList.remove('dragging');
      document.getElementById('drag-hint').style.display = 'none';
    });
    el.addEventListener('click', e => {
      if (e.target.classList.contains('rm')) return;
      showModal(el.dataset.kw);
    });
  });

  // 수동 섹터 드롭존
  hm.querySelectorAll('.sector[data-manual]').forEach(sec => {
    sec.addEventListener('dragover', e => { e.preventDefault(); sec.classList.add('drag-over'); });
    sec.addEventListener('dragleave', e => {
      if (!sec.contains(e.relatedTarget)) sec.classList.remove('drag-over');
    });
    sec.addEventListener('drop', e => {
      e.preventDefault();
      sec.classList.remove('drag-over');
      if (!dragKw) return;
      const gname = sec.dataset.manual;
      const groups = getGroups();
      if (!groups[gname].keywords.includes(dragKw)) {
        groups[gname].keywords.push(dragKw);
        setGroups(groups);
        renderHeatmap();
      }
    });
  });
}

// ── 그룹 관리 ─────────────────────────────────────
function addGroup() {
  const name = document.getElementById('new-group-input').value.trim();
  const color = document.getElementById('new-group-color').value;
  if (!name) return;
  const g = getGroups();
  if (g[name]) { alert('이미 있는 이름이에요.'); return; }
  g[name] = { color, keywords: [] };
  setGroups(g);
  document.getElementById('new-group-input').value = '';
  renderHeatmap();
}

function deleteGroup(name) {
  if (!confirm(`"${name}" 그룹을 삭제할까요?`)) return;
  const g = getGroups();
  delete g[name];
  setGroups(g);
  renderHeatmap();
}

function removeKw(gname, kw) {
  const g = getGroups();
  if (!g[gname]) return;
  g[gname].keywords = g[gname].keywords.filter(k => k !== kw);
  setGroups(g);
  renderHeatmap();
}

// ── 뉴스 모달 ─────────────────────────────────────
function showModal(name) {
  const kw = allKws.find(k => k.name === name);
  if (!kw) return;
  const color = (DB.group_colors || {})[kw.autoGroup] || '#58a6ff';
  document.getElementById('modal-title').innerHTML = `<span style="color:${color}">#</span> ${name}`;
  document.getElementById('modal-meta').textContent =
    `${kw.autoGroup || '미분류'} · ${kw.count}회 언급 · ${kw.articles.length}건`;
  document.getElementById('modal-body').innerHTML = kw.articles.map(a => `
    <div class="news-card">
      <div class="card-title">${a.url ? `<a href="${a.url}" target="_blank">🔗 ${a.title}</a>` : a.title}</div>
      <div class="card-date">📅 ${a.date}</div>
      <div class="card-summary">${(a.summary || '').replace(/\n/g, '<br>')}</div>
      ${a.insight ? `<div class="card-insight">📈 ${(a.insight||'').replace(/\n/g,'<br>')}</div>` : ''}
    </div>`).join('');
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }
function escJ(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

init();
</script>
</body>
</html>
